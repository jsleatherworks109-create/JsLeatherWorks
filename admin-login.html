<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | JS Leather Works</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body data-page="admin-login">
    <main>
      <section class="hero">
        <div>
          <h1>Admin Access</h1>
          <form class="form-stack" data-admin-login-form>
            <label>Access code<input name="code" type="text" inputmode="numeric" autocomplete="one-time-code" required></label>
            <button type="submit">Enter dashboard</button>
          </form>
          <p class="small" data-login-message></p>
        </div>
      </section>
    </main>
    <script src="assets/app.js"></script>
  </body>
</html>
